services:
  db:
    image: postgres:16
    container_name: fipe_postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?Defina POSTGRES_DB no arquivo .env}
      POSTGRES_USER: ${POSTGRES_USER:?Defina POSTGRES_USER no arquivo .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Defina POSTGRES_PASSWORD no arquivo .env}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build: .
    container_name: fipe_streamlit
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:?Defina POSTGRES_USER no arquivo .env}:${POSTGRES_PASSWORD:?Defina POSTGRES_PASSWORD no arquivo .env}@db:5432/${POSTGRES_DB:?Defina POSTGRES_DB no arquivo .env}
      FIPE_CACHE_PATH: ${FIPE_CACHE_PATH:-logs/fipe_cache.json}
      FIPE_MAX_WORKERS: ${FIPE_MAX_WORKERS:-10}
    ports:
      - "8501:8501"
    volumes:
      - .:/app

volumes:
  postgres_data:
